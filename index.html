        const estRecords = studentsData.filter(s => s.documentoEstudiante === filterStudent);
        if(estRecords.length === 0) return Swal.fire('Sin datos', 'No hay registros.', 'info');
        const doc = new window.jspdf.jsPDF(); const estName = estRecords[0].nombreEstudiante;
        doc.setFontSize(14); doc.setTextColor(6, 78, 59); doc.text(`INFORME ACADÉMICO INTEGRAL`, 105, 15, null, null, 'center'); doc.setFontSize(10); doc.setTextColor(0, 0, 0); doc.text(`Estudiante: ${estName}`, 10, 25); doc.text(`Periodo: ${periodoVisualizacion}`, 10, 30);
        const byArea = {}; estRecords.forEach(r => { if(!byArea[r.area]) byArea[r.area] = []; byArea[r.area].push(r); });
        let currentY = 35;
        Object.keys(byArea).forEach(area => {
            const rows = byArea[area].map(r => {
                let finalScore = (r.score || '0').replace('.', ','); if(r.recuperada && r.notaAnterior) finalScore = `${r.notaAnterior} -> ${finalScore}`;
                let finalObs = r.observacion || ''; if(r.recuperada) finalObs += (finalObs ? ' - ' : '') + 'Trabajo recuperado.'; else if (r.nota < 3.0) finalObs += (finalObs ? ' - ' : '') + 'Nota No recuperada.';
                return [r.actividad, finalScore, finalObs || '-'];
            });
            doc.autoTable({ startY: currentY + 5, head: [[`${area}`, 'NOTA', 'OBSERVACIÓN']], body: rows, headStyles: { fillColor: [6, 78, 59] }, columnStyles: { 2: { cellWidth: 90 } }, margin: { top: 10 } });
            currentY = doc.lastAutoTable.finalY;
        });
        doc.save(`Informe_${estName.replace(/ /g, '_')}.pdf`);
      };

      const generateGeneralAgendaPDF = () => {
        const doc = new window.jspdf.jsPDF(); const activeTasks = agendaItems.filter(i => !i.archived && i.status !== 'draft');
        const body = activeTasks.map(t => [t.date, t.gradeLevel, t.area, t.title || '']);
        doc.autoTable({ head: [['FECHA', 'GRADO', 'ÁREA', 'TÍTULO']], body, headStyles: { fillColor: [6, 78, 59] } }); doc.save(`Agenda_General.pdf`);
      };

      const archiveTask = async (task) => { await db.collection("agendaEscolar").doc(task.id).update({ archived: true, publico: false }); };

      const filteredRecords = useMemo(() => {
        let base = studentsData.filter(s => s.gradeLevel === filterGrade);
        if (filterArea === 'SIN_AREA') base = base.filter(s => !s.area || s.area.trim() === ''); else if (filterArea) base = base.filter(s => s.area === filterArea);
        if (filterActivity) base = base.filter(r => r.actividad === filterActivity);
        if (filterStudent) base = base.filter(r => r.documentoEstudiante === filterStudent);
        return base;
      }, [studentsData, filterGrade, filterArea, filterActivity, filterStudent]);

      const currentActivities = useMemo(() => {
        let base = studentsData.filter(s => s.gradeLevel === filterGrade);
        if (filterArea === 'SIN_AREA') base = base.filter(s => !s.area || s.area.trim() === ''); else if (filterArea) base = base.filter(s => s.area === filterArea);
        return [...new Set(base.map(r => r.actividad))];
      }, [studentsData, filterGrade, filterArea]);

      return (
        <div className="flex flex-col h-[100dvh]">
          <header className="px-6 pt-12 pb-6 bg-[#064e3b] sticky top-0 z-40 shadow-xl">
            <div className="flex justify-between items-center text-white">
              <div><h1 className="text-2xl font-black uppercase tracking-tighter">Docente <span className="text-[#facc15]">2026</span></h1><p className="text-[10px] font-bold text-emerald-200 uppercase">P{periodoVisualizacion} · Tierra</p></div>
              <div className="flex gap-2">
                <button onClick={() => setIsXpModalOpen(true)} disabled={isSaving} className="h-12 w-12 rounded-2xl bg-white/10 flex items-center justify-center border border-white/20 active:scale-90 text-[#facc15]"><StarIcon size={22} /></button>
                <button onClick={() => setIsBoardOpen(true)} disabled={isSaving} className="h-12 w-12 rounded-2xl bg-white/10 flex items-center justify-center border border-white/20 active:scale-90 text-[#facc15]"><BoardIcon size={22} /></button>
                <button onClick={() => setIsConfigOpen(true)} disabled={isSaving} className="h-12 w-12 rounded-2xl bg-white/10 flex items-center justify-center border border-white/20 active:scale-90 text-[#facc15]"><Settings size={22} /></button>
              </div>
            </div>
          </header>

          <main className="flex-1 overflow-y-auto p-4 pb-40 no-scrollbar">
            {view === 'recent' && (
              <div className="space-y-4">
                <h2 className="text-[11px] font-black text-stone-600 uppercase px-1">Registros Recientes</h2>
                {studentsData.slice(0, 10).map(s => (
                  <div key={s.id} className="earth-card p-5 flex justify-between items-center">
                    <div className="min-w-0 pr-4">
                      <div className="flex gap-2 mb-1">
                        <span className="text-[9px] font-black bg-stone-100 px-2 py-0.5 rounded uppercase">{s.gradeLevel}</span>
                        <span className="text-[9px] font-black bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded uppercase">{s.area}</span>
                      </div>
                      <h3 className="text-sm font-bold truncate">{s.nombreEstudiante}</h3>
                      <p className="text-[10px] text-stone-500">{s.actividad}</p>
                    </div>
                    <div className="text-right font-black text-[#064e3b] text-2xl">{(s.score||'0').replace('.',',')}</div>
                  </div>
                ))}
              </div>
            )}

            {view === 'agenda' && (
              <div className="space-y-6">
                <div className="earth-card p-6 space-y-4">
                  <h3 className="text-[10px] font-black text-stone-400 uppercase tracking-widest">Nueva Tarea</h3>
                  <div className="flex gap-2 bg-stone-100 p-1 rounded-xl">
                    <button onClick={()=>setAssignmentType('group')} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg ${assignmentType==='group'?'bg-white text-emerald-900 shadow-sm':'text-stone-400'}`}>Grupal</button>
                    <button onClick={()=>setAssignmentType('individual')} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg ${assignmentType==='individual'?'bg-white text-emerald-900 shadow-sm':'text-stone-400'}`}>Individual</button>
                  </div>
                  {assignmentType === 'group' ? (
                    <div className="grid grid-cols-5 gap-1">
                      {gradeLevels.map(g => (<button key={g} onClick={()=>setSelectedGrades(prev => prev.includes(g) ? prev.filter(x=>x!==g) : [...prev, g])} className={`py-3 rounded-xl text-[10px] font-black border ${selectedGrades.includes(g)?'bg-[#064e3b] text-[#facc15] border-[#064e3b]':'bg-white text-stone-400 border-stone-200'}`}>{g}</button>))}
                    </div>
                  ) : (
                    <div className="grid grid-cols-2 gap-3">
                      <select value={newTask.gradeLevel} onChange={e=>setNewTask({...newTask,gradeLevel:e.target.value})} className="p-4 text-xs font-black">{gradeLevels.map(g => <option key={g} value={g}>{g}</option>)}</select>
                      <select value={newTask.targetStudent} onChange={e=>setNewTask({...newTask,targetStudent:e.target.value})} className="p-4 text-xs font-black"><option value="">Estudiante...</option>{(studentLists[newTask.gradeLevel] || []).map(name => <option key={name.split(' - ')[1]} value={name.split(' - ')[1]}>{name.split(' - ')[0]}</option>)}</select>
                    </div>
                  )}
                  <select value={newTask.area} onChange={e=>setNewTask({...newTask,area:e.target.value})} className="w-full p-4 text-xs font-black"><option value="">Área...</option>{areasList.map(a => <option key={a} value={a}>{a}</option>)}</select>
                  <input type="text" placeholder="Título Actividad" value={newTask.title} onChange={e=>setNewTask({...newTask,title:e.target.value})} className="w-full p-4 text-sm font-bold"/>
                  <div className="grid grid-cols-2 gap-3">
                    <input type="date" value={newTask.date} onChange={e=>setNewTask({...newTask,date:e.target.value})} className="w-full p-4 text-xs font-black"/>
                    <div className="flex gap-2">
                        <div className="flex-1 flex items-center justify-center bg-stone-50 rounded-xl border border-dashed border-stone-300"><VideoIcon size={16} className={newTask.videoLink ? 'text-red-600' : 'text-stone-300'}/></div>
                        <div className="flex-1 flex items-center justify-center bg-stone-50 rounded-xl border border-dashed border-stone-300"><FileText size={16} className={newTask.pdfLink ? 'text-blue-600' : 'text-stone-300'}/></div>
                    </div>
                  </div>
                  
                  <div className="flex gap-2">
                      <input type="text" placeholder="URL de Imagen o subir 👉" value={newTask.imageUrl || ''} onChange={e=>setNewTask({...newTask,imageUrl:e.target.value})} className="w-full p-3 text-[10px] font-black bg-stone-50 flex-1"/>
                      <label className="bg-stone-200 px-3 py-3 rounded-xl border border-stone-300 text-[10px] font-black cursor-pointer shadow-sm active:scale-95 shrink-0 flex items-center justify-center">📷<input type="file" accept="image/*" onChange={(e) => handleTaskImageUpload(e, false)} className="hidden"/></label>
                  </div>
                  
                  <input type="url" placeholder="URL de YouTube o TikTok" value={newTask.videoLink} onChange={e=>setNewTask({...newTask,videoLink:e.target.value})} className="w-full p-3 text-[10px] font-black bg-stone-50"/>
                  <input type="url" placeholder="URL de Documento (Drive o PDF externo)" value={newTask.pdfLink} onChange={e=>setNewTask({...newTask,pdfLink:e.target.value})} className="w-full p-3 text-[10px] font-black bg-stone-50"/>
                  <textarea placeholder="Descripción..." value={newTask.description} onChange={e=>setNewTask({...newTask,description:e.target.value})} className="w-full p-4 text-sm font-bold h-24 resize-none"></textarea>
                  
                  <div className="bg-red-50 p-3 rounded-xl border border-red-200">
                      <label className="block text-[9px] font-black text-red-600 uppercase mb-2 flex items-center gap-1"><EyeOffIcon size={12}/> Ocultar a (Excluir estudiantes):</label>
                      <select onChange={e => { if(!e.target.value) return; if(!newTask.excludedStudents.includes(e.target.value)) { setNewTask({...newTask, excludedStudents: [...newTask.excludedStudents, e.target.value]}); } }} className="w-full p-2 text-[10px] font-black bg-white rounded-lg border border-red-200">
                          <option value="">Seleccionar para ocultar...</option>
                          {(studentLists[newTask.gradeLevel] || []).map(name => <option key={name.split(' - ')[1]} value={name.split(' - ')[1]}>{name.split(' - ')[0]}</option>)}
                      </select>
                      <div className="flex flex-wrap gap-1 mt-2">
                          {newTask.excludedStudents.map(doc => {
                              const stuName = (studentLists[newTask.gradeLevel] || []).find(s => s.includes(doc))?.split(' - ')[0] || doc;
                              return <span key={doc} onClick={() => setNewTask({...newTask, excludedStudents: newTask.excludedStudents.filter(d => d !== doc)})} className="px-2 py-1 bg-red-600 text-white text-[8px] font-black rounded-lg cursor-pointer shadow-sm active:scale-90">✕ {stuName}</span>;
                          })}
                      </div>
                  </div>

                  <div className="bg-stone-50 p-3 rounded-xl border border-stone-200">
                    <label className="block text-[9px] font-black text-stone-500 uppercase mb-2">Programar Publicación (Opcional)</label>
                    <input type="datetime-local" value={newTask.publishAt} onChange={e=>setNewTask({...newTask, publishAt:e.target.value})} className="w-full p-3 text-[10px] font-black bg-white rounded-lg border border-stone-300"/>
                  </div>
                  <div className="flex gap-2">
                      <button onClick={() => handlePreviewAgenda(newTask)} disabled={isSaving} className="flex-[1] py-4 bg-sky-100 text-sky-700 border border-sky-200 font-black rounded-2xl text-[10px] uppercase shadow-sm">👁️ Previa</button>
                      <button onClick={() => handleAddTask('draft')} disabled={isSaving} className="flex-[1.5] py-4 bg-stone-200 text-stone-600 font-black rounded-2xl text-[10px] uppercase">Borrador</button>
                      <button onClick={() => handleAddTask('published')} disabled={isSaving} className="flex-[2] py-4 bg-[#064e3b] text-white font-black rounded-2xl text-[10px] uppercase shadow-lg">Publicar</button>
                  </div>
                </div>

                <div className="space-y-4">
                  <button onClick={generateGeneralAgendaPDF} className="w-full py-4 bg-[#facc15] text-[#064e3b] font-black rounded-2xl text-[11px] uppercase shadow-md flex items-center justify-center gap-2"><FileText size={16}/> Descargar Agenda PDF</button>
                  <div className="flex gap-2 bg-stone-100 p-1 rounded-2xl">
                    <button onClick={()=>setAgendaTab('published')} className={`flex-1 py-3 text-[10px] font-black uppercase rounded-xl ${agendaTab==='published'?'bg-[#064e3b] text-[#facc15] shadow-md':'text-stone-400'}`}>Publicadas</button>
                    <button onClick={()=>setAgendaTab('draft')} className={`flex-1 py-3 text-[10px] font-black uppercase rounded-xl ${agendaTab==='draft'?'bg-[#064e3b] text-[#facc15] shadow-md':'text-stone-400'}`}>Borradores</button>
                    <button onClick={()=>setAgendaTab('archived')} className={`flex-1 py-3 text-[10px] font-black uppercase rounded-xl ${agendaTab==='archived'?'bg-[#064e3b] text-[#facc15] shadow-md':'text-stone-400'}`}>Archivadas</button>
                  </div>
                  
                  <div className="bg-stone-50 p-2 rounded-2xl border border-stone-200 grid grid-cols-2 md:grid-cols-3 gap-2 mb-4">
                     <select value={agendaFilterGrade} onChange={e=>setAgendaFilterGrade(e.target.value)} className="w-full p-2 text-[9px] font-black border-none bg-white rounded-xl shadow-sm"><option value="">Todos los Grados</option>{gradeLevels.map(g => <option key={g} value={g}>{g}</option>)}</select>
                     <select value={agendaFilterArea} onChange={e=>setAgendaFilterArea(e.target.value)} className="w-full p-2 text-[9px] font-black border-none bg-white rounded-xl shadow-sm"><option value="">Todas las Áreas</option>{areasList.map(a => <option key={a} value={a}>{a}</option>)}</select>
                     <input type="date" value={agendaFilterDate} onChange={e=>setAgendaFilterDate(e.target.value)} className="w-full p-2 text-[9px] font-black border-none bg-white rounded-xl shadow-sm col-span-2 md:col-span-1" />
                  </div>

                  {agendaItems.filter(item => {
                    const expired = isExpired(item.date); 
                    if (agendaTab === 'archived') return item.archived || (item.status !== 'draft' && expired);
                    if (agendaTab === 'draft') return item.status === 'draft' && !item.archived;
                    return item.status !== 'draft' && !item.archived && !expired;
                  }).filter(item => {
                    let show = true;
                    if (agendaFilterGrade && item.gradeLevel !== agendaFilterGrade) show = false;
                    if (agendaFilterArea && item.area !== agendaFilterArea) show = false;
                    if (agendaFilterDate && item.date !== agendaFilterDate) show = false;
                    return show;
                  }).map(item => (
                    <div key={item.id} className={`earth-card p-5 border-l-[6px] ${item.archived || isExpired(item.date) ? 'border-l-stone-400 bg-stone-100 opacity-70' : 'border-l-[#facc15]'}`}>
                      <div className="flex justify-between items-start mb-2">
                        <div className="flex flex-wrap gap-1">
                            <span className="text-[8px] font-black bg-stone-900 text-white px-2 py-0.5 rounded uppercase">{item.gradeLevel}</span>
                            <span className="text-[8px] font-black bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded uppercase">{item.area}</span>
                            {item.imageUrl && <span className="text-[8px] font-black bg-purple-100 text-purple-600 px-1.5 py-0.5 rounded flex items-center gap-1">📷 IMG</span>}
                            {item.videoLink && <span className="text-[8px] font-black bg-red-100 text-red-600 px-1.5 py-0.5 rounded flex items-center gap-1"><VideoIcon size={8}/> VIDEO</span>}
                            {item.pdfLink && <span className="text-[8px] font-black bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded flex items-center gap-1"><FileText size={8}/> DOC</span>}
                        </div>
                        <span className="text-[10px] font-black text-[#064e3b]">{item.date}</span>
                      </div>
                      
                      {item.publishAt && new Date(item.publishAt) > new Date() && (
                          <div className="bg-blue-50 text-blue-700 text-[9px] font-black px-2 py-1 rounded-lg mb-2 inline-flex items-center gap-1 border border-blue-200">
                              <span>⏳ PROGRAMADA PARA: {new Date(item.publishAt).toLocaleString('es-CO', { day: 'numeric', month: 'short', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true })}</span>
                          </div>
                      )}
                      
                      {item.excludedStudents && item.excludedStudents.length > 0 && (
                          <div className="bg-red-50 text-red-700 text-[9px] font-black px-2 py-1 rounded-lg mb-2 inline-flex items-center gap-1 border border-red-200">
                              <EyeOffIcon size={10}/> OCULTO PARA {item.excludedStudents.length} EST.
                          </div>
                      )}

                      <h3 className="font-extrabold text-stone-900 text-sm uppercase">{item.title}</h3>
                      <div className="flex justify-end gap-2 mt-4 pt-4 border-t border-stone-100">
                        {item.status === 'draft' ? (
                            <button onClick={()=>publishDraft(item)} disabled={isSaving} className="p-2 text-blue-600 bg-blue-50 rounded-lg"><Send size={20}/></button>
                        ) : (
                            item.archived || isExpired(item.date) ? (
                                <button onClick={()=>republishTask(item)} disabled={isSaving} className="p-2 text-emerald-600 bg-emerald-50 rounded-lg"><RestoreIcon size={20}/></button>
                            ) : (
                                <button onClick={()=>archiveTask(item)} disabled={isSaving} className="p-2 text-stone-400"><ArchiveIcon size={20}/></button>
                            )
                        )}
                        <button onClick={()=>duplicateTask(item)} className="p-2 text-stone-600 bg-stone-100 rounded-lg"><CopyIcon size={20}/></button>
                        <button onClick={()=>{ setEditingTask(item); setEditAssignmentType(item.targetStudent ? 'individual' : 'group'); setEditSelectedGrades([item.gradeLevel]); }} className="p-2 text-stone-400"><EditIcon size={20}/></button>
                        <button onClick={async ()=>{ if((await Swal.fire({title:'¿Eliminar?', icon:'warning', showCancelButton:true})).isConfirmed) db.collection("agendaEscolar").doc(item.id).delete(); }} className="p-2 text-stone-400"><TrashIcon size={20}/></button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {view === 'records' && (
              <div className="space-y-6">
                <div className="earth-card p-4 space-y-3 bg-stone-50">
                  <div className="grid grid-cols-2 gap-2">
                    <select value={filterGrade} onChange={e=>{setFilterGrade(e.target.value); setFilterStudent('');}} className="p-3 text-xs font-black">{gradeLevels.map(g => <option key={g} value={g}>{g}</option>)}</select>
                    <select value={filterArea} onChange={e=>setFilterArea(e.target.value)} className="p-3 text-xs font-black"><option value="">Seleccionar Área...</option><option value="SIN_AREA">⚠️ SIN ÁREA</option>{areasList.map(a => <option key={a} value={a}>{a}</option>)}</select>
                  </div>
                  <select value={filterStudent} onChange={e=>setFilterStudent(e.target.value)} className="w-full p-3 text-xs font-black"><option value="">Todos los Estudiantes...</option>{(studentLists[filterGrade] || []).map(name => <option key={name.split(' - ')[1]} value={name.split(' - ')[1]}>{name.split(' - ')[0]}</option>)}</select>
                  <select value={filterActivity} onChange={e=>setFilterActivity(e.target.value)} className="w-full p-3 text-xs font-black"><option value="">Todas las Actividades...</option>{currentActivities.map(act => <option key={act} value={act}>{act}</option>)}</select>
                  <div className="grid grid-cols-2 gap-2">
                    <button onClick={generateReportPDF} className="p-4 bg-[#064e3b] text-[#facc15] font-black text-[10px] uppercase rounded-xl flex items-center justify-center gap-2 shadow-lg active:scale-95"><FileText size={16}/> DESCARGAR PDF</button>
                    <button onClick={generateObservationsPDF} className="p-4 bg-stone-700 text-white font-black text-[10px] uppercase rounded-xl flex items-center justify-center gap-2 shadow-lg active:scale-95"><FileText size={16}/> PDF OBS./ALERTAS</button>
                    <button onClick={generateStudentReportPDF} className="p-4 bg-blue-800 text-white font-black text-[10px] uppercase rounded-xl flex items-center justify-center gap-2 shadow-lg active:scale-95 col-span-2 md:col-span-1"><FileText size={16}/> PDF ESTUDIANTE</button>
                    <button onClick={async ()=>{ if(!filterActivity) return; if((await Swal.fire({title:'¿Borrar Actividad?', icon:'warning', showCancelButton:true})).isConfirmed){ const b = db.batch(); filteredRecords.forEach(r => b.delete(db.collection("notasAcademicas").doc(r.id))); await b.commit(); setFilterActivity(''); } }} className="p-4 bg-red-800 text-white font-black text-[10px] uppercase rounded-xl shadow-lg active:scale-95">BORRAR ACTIVIDAD</button>
                  </div>
                </div>
                
                <div className="overflow-x-auto">
                    <table className="table-earth">
                        <thead><tr><th>Estudiante</th><th className="text-center">Nota</th><th className="text-right">Acción</th></tr></thead>
                        <tbody>
                            {(studentLists[filterGrade] || []).map(studentNameDoc => {
                                const [name, doc] = studentNameDoc.split(' - ');
                                const record = filteredRecords.find(r => r.documentoEstudiante === doc);
                                if (record) {
                                    return (
                                        <tr key={record.id}>
                                            <td><p className="text-xs font-black">{record.nombreEstudiante}</p><p className="text-[9px] text-stone-400">{record.actividad}</p></td>
                                            <td className="text-center font-black text-lg">{(record.score||'0').replace('.',',')}{record.recuperada && <span className="block text-[8px] text-red-600 font-bold">(Recuperó)</span>}</td>
                                            <td className="text-right flex justify-end gap-1">
                                                <button onClick={()=>{ setEditingGradeEntry({...record, originalNota: parseFloat(record.score.replace(',','.'))}); setIsFormOpen(false); }} className="p-2 bg-stone-100 rounded-lg"><EditIcon size={14}/></button>
                                                <button onClick={()=>deleteSingleGrade(record.id)} className="p-2 bg-red-50 text-red-500 rounded-lg"><TrashIcon size={14}/></button>
                                            </td>
                                        </tr>
                                    );
                                } 
                                else if (filterActivity) {
                                    return (
                                        <tr key={doc} className="opacity-60 bg-stone-50">
                                            <td><p className="text-xs font-black text-stone-400">{name}</p><p className="text-[8px] font-bold text-red-500 uppercase tracking-tighter">⚠️ Pendiente</p></td>
                                            <td className="text-center text-stone-300 font-black">-,-</td>
                                            <td className="text-right">
                                                <button onClick={() => {
                                                    let realArea = filterArea;
                                                    if (!realArea || realArea === 'SIN_AREA') { const sibling = studentsData.find(r => r.actividad === filterActivity && r.area && r.area !== 'SIN_AREA'); if (sibling) realArea = sibling.area; }
                                                    setEditingGradeEntry({ id: `${periodoActual}_${filterGrade}_${realArea}_${filterActivity.trim().replace(/\s+/g, '_')}_${doc}`, nombreEstudiante: name, documentoEstudiante: doc, gradeLevel: filterGrade, area: realArea, actividad: filterActivity, score: '', observacion: '', originalNota: 0, isNew: true });
                                                }} className="p-2 bg-[#facc15] text-[#064e3b] rounded-lg"><Plus size={14}/></button>
                                            </td>
                                        </tr>
                                    );
                                }
                                return null;
                            })}
                        </tbody>
                    </table>
                </div>
              </div>
            )}

            {view === 'panels' && (
              <div className="space-y-4">

                        <div className="flex gap-2 bg-white p-1 rounded-xl shadow-sm">{['General', 'Grado', 'Individual'].map(s => (<button key={s} onClick={()=>setNoticeScope(s)} className={`flex-1 py-2 text-[10px] font-black rounded-lg transition-all ${noticeScope===s?'bg-[#064e3b] text-white':'text-stone-400'}`}>{s}</button>))}</div>
                        {noticeScope === 'Grado' && (<div className="flex flex-wrap gap-1">{gradeLevels.map(g => (<button key={g} onClick={()=>toggleNoticeTarget(g)} className={`px-2 py-1 rounded text-[10px] font-black border ${noticeTargets.includes(g) ? 'bg-emerald-600 text-white' : 'bg-white text-stone-400'}`}>{g}</button>))}</div>)}
                        {noticeScope === 'Individual' && (<select value={targetStudentDoc} onChange={e=>setTargetStudentDoc(e.target.value)} className="w-full p-2 text-[10px] font-black bg-white rounded-lg border border-stone-300"><option value="">Seleccionar Estudiante...</option>{Object.values(studentLists).flat().map(student => { const [name, doc] = student.split(' - '); return <option key={doc} value={doc}>{name}</option> })}</select>)}
                        
                        <div className="mt-2 bg-red-50 p-2 rounded-lg border border-red-100">
                            <label className="block text-[8px] font-black text-red-600 uppercase mb-1 flex items-center gap-1"><EyeOffIcon size={10}/> Ocultar Aviso A:</label>
                            <select onChange={e => { if(!e.target.value) return; if(!noticeExcluded.includes(e.target.value)) setNoticeExcluded([...noticeExcluded, e.target.value]); }} className="w-full p-1.5 text-[9px] font-black bg-white rounded border border-red-200"><option value="">Seleccionar para ocultar...</option>{Object.values(studentLists).flat().map(student => { const [name, doc] = student.split(' - '); return <option key={doc} value={doc}>{name}</option> })}</select>
                            <div className="flex flex-wrap gap-1 mt-1">
                                {noticeExcluded.map(doc => { const stuName = Object.values(studentLists).flat().find(s => s.includes(doc))?.split(' - ')[0] || doc; return <span key={doc} onClick={() => setNoticeExcluded(noticeExcluded.filter(d => d !== doc))} className="px-1.5 py-0.5 bg-red-600 text-white text-[7px] font-black rounded cursor-pointer">✕ {stuName}</span>; })}
                            </div>
                        </div>

                    </div>
                    <div className="grid grid-cols-2 gap-2 mt-2">
                        <div className="bg-stone-50 p-2 rounded-xl border border-stone-200"><label className="block text-[8px] font-black text-stone-500 uppercase">Publicar</label><input type="datetime-local" value={noticePublishAt} onChange={e=>setNoticePublishAt(e.target.value)} className="w-full text-[9px] font-black bg-transparent border-none p-0 focus:ring-0"/></div>
                        <div className="bg-stone-50 p-2 rounded-xl border border-stone-200"><label className="block text-[8px] font-black text-stone-500 uppercase">Expirar</label><input type="datetime-local" value={noticeExpiresAt} onChange={e=>setNoticeExpiresAt(e.target.value)} className="w-full text-[9px] font-black bg-transparent border-none p-0 focus:ring-0"/></div>
                    </div>
                    <div className="flex gap-2 mt-2">
                        <select value={noticeColor} onChange={e=>setNoticeColor(e.target.value)} className="p-2 text-xs font-black rounded-xl border border-stone-300 w-1/3"><option value="yellow">Amarillo</option><option value="pink">Rosado</option><option value="blue">Azul</option><option value="green">Verde</option><option value="orange">Naranja</option><option value="white">Blanco</option></select>
                        <button onClick={()=>setIsPreviewNoticeOpen(true)} className="flex-1 bg-sky-100 text-sky-700 font-black text-[10px] uppercase rounded-xl border border-sky-200 active:scale-95">👀 VISTA PREVIA</button>
                        <button onClick={handlePublishNotice} className="flex-1 bg-[#064e3b] text-[#facc15] font-black text-[10px] uppercase rounded-xl shadow-lg active:scale-95">{editingNoticeId ? 'GUARDAR' : 'PUBLICAR'}</button>
                    </div>
                    <div className="space-y-2 mt-4">
                        {noticesList.filter(n => noticeTab === 'active' ? !n.archived : n.archived).map(n => (
                            <div key={n.id} className="flex justify-between items-center p-3 rounded-xl border bg-white border-stone-200">
                                <p className="text-[10px] font-black text-stone-700 truncate flex-1">{n.mensaje}</p>
                                <div className="flex gap-1">
                                    {noticeTab === 'active' && <button onClick={()=>prepareEditNotice(n)} className="p-1.5 text-blue-600"><EditIcon size={14}/></button>}
                                    <button onClick={()=>archiveNotice(n)} className="p-1.5 text-stone-500">{noticeTab === 'active' ? <ArchiveIcon size={14}/> : <RestoreIcon size={14}/>}</button>
                                    <button onClick={()=>deleteNotice(n.id)} className="p-1.5 text-red-500"><TrashIcon size={14}/></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
              </div>
            </div>
          )}

          {isFormOpen && (
            <div className="fixed inset-0 z-[100] flex items-end justify-center">
              <div className="absolute inset-0 bg-stone-900/60 backdrop-blur-md" onClick={()=>setIsFormOpen(false)} />
              <div className="relative bg-white w-full max-w-lg h-[85vh] rounded-t-[40px] shadow-2xl flex flex-col border-t-8 border-[#064e3b] overflow-hidden">
                <div className="p-8 border-b flex justify-between items-center"><h2 className="text-xl font-black text-stone-900 uppercase">Notas P{periodoActual}</h2><button onClick={()=>setIsFormOpen(false)}>✕</button></div>
                <div className="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar">
                  
                  <div className="flex items-center gap-3 p-3 bg-stone-100 rounded-xl border border-stone-200 mb-2">
                     <input type="checkbox" id="chkMassiveXp" checked={massiveAwardXp} onChange={e => setMassiveAwardXp(e.target.checked)} className="w-6 h-6 accent-[#064e3b] cursor-pointer" />
                     <label htmlFor="chkMassiveXp" className="text-[10px] font-black text-stone-600 uppercase cursor-pointer leading-tight">Otorgar XP y Medallas al guardar<br/><span className="text-[8px] text-stone-400">Desmarca si la nota viene de la App del Estudiante para evitar doble puntaje</span></label>
                  </div>

                  <input type="text" name="actividad" placeholder="Actividad..." value={batchData.actividad} onChange={handleBatchConfigChange} className="w-full text-lg font-black border-b-2 pb-2 outline-none"/>
                  <div className="grid grid-cols-2 gap-3">
                    <select name="gradeLevel" value={batchData.gradeLevel} onChange={handleBatchConfigChange} className="p-4 text-xs font-black"><option value="">Grado...</option>{gradeLevels.map(g=><option key={g} value={g}>{g}</option>)}</select>
                    <select name="area" value={batchData.area} onChange={handleBatchConfigChange} className="p-4 text-xs font-black"><option value="">Área...</option>{areasList.map(a=><option key={a} value={a}>{a}</option>)}</select>
                  </div>
                  {batchData.entries.map((en, idx) => (
                    <div key={idx} className={`p-4 rounded-2xl border-2 ${en.saved ? 'border-emerald-500 bg-emerald-50' : 'border-stone-200'} space-y-3`}>
                      <div className="flex justify-between items-start gap-4">
                        <div className="flex-1">
                            <span className="text-[11px] font-black text-stone-900 uppercase block mb-2">{en.name.split(' - ')[0]}</span>
                            <textarea placeholder="Observaciones..." value={en.observation} onChange={e => {const newEntries = [...batchData.entries]; newEntries[idx].observation = e.target.value; setBatchData({...batchData, entries: newEntries});}} className="w-full h-16 p-2 text-[10px] font-bold resize-none border rounded-lg"/>
                        </div>
                        <div className="flex flex-col gap-2 items-center">
                            <input type="text" placeholder="0.0" value={en.score} onChange={e => {const newEntries = [...batchData.entries]; newEntries[idx].score = e.target.value.replace(/,/g, '.'); setBatchData({...batchData, entries: newEntries});}} className="w-16 h-12 text-center bg-white border-2 border-stone-400 rounded-xl font-black text-xl"/>
                            <button onClick={() => saveIndividualGrade(en, idx)} disabled={isSaving} className={`p-3 rounded-xl shadow-md ${en.saved ? 'bg-emerald-600 text-white' : 'bg-[#facc15] text-[#064e3b]'}`}><SaveIcon size={18} /></button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="p-8 border-t"><button onClick={saveGrades} disabled={isSaving} className="w-full bg-[#064e3b] text-[#facc15] py-5 rounded-2xl font-black uppercase shadow-lg">Guardar Todo el Grupo</button></div>
              </div>
            </div>
          )}

          {editingTask && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-stone-900/80" onClick={()=>setEditingTask(null)} />
              <div className="relative bg-white w-full max-w-md rounded-[40px] p-6 border-t-[10px] border-[#facc15] max-h-[90vh] overflow-y-auto no-scrollbar">
                <h3 className="font-black mb-4 uppercase text-emerald-900">Editar Tarea</h3>
                <div className="space-y-3">
                    
                    <div className="flex gap-2 bg-stone-100 p-1 rounded-xl mb-3">
                      <button onClick={()=>setEditAssignmentType('group')} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg ${editAssignmentType==='group'?'bg-white text-emerald-900 shadow-sm':'text-stone-400'}`}>Grupal</button>
                      <button onClick={()=>setEditAssignmentType('individual')} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg ${editAssignmentType==='individual'?'bg-white text-emerald-900 shadow-sm':'text-stone-400'}`}>Individual</button>
                    </div>

                    {editAssignmentType === 'group' ? (
                      <div className="grid grid-cols-5 gap-1 mb-3">
                        {gradeLevels.map(g => (
                          <button key={g} onClick={()=>setEditSelectedGrades(prev => prev.includes(g) ? prev.filter(x=>x!==g) : [...prev, g])} className={`py-3 rounded-xl text-[10px] font-black border ${editSelectedGrades.includes(g)?'bg-[#064e3b] text-[#facc15] border-[#064e3b]':'bg-white text-stone-400 border-stone-200'}`}>{g}</button>
                        ))}
                      </div>
                    ) : (
                      <div className="grid grid-cols-2 gap-3 mb-3">
                        <select value={editingTask.gradeLevel || 'Quinto'} onChange={e=>{setEditingTask({...editingTask, gradeLevel:e.target.value, targetStudent: ''}); setEditSelectedGrades([e.target.value]);}} className="p-3 text-xs font-black">{gradeLevels.map(g => <option key={g} value={g}>{g}</option>)}</select>
                        <select value={editingTask.targetStudent || ''} onChange={e=>setEditingTask({...editingTask, targetStudent:e.target.value})} className="p-3 text-xs font-black bg-stone-50"><option value="">Estudiante...</option>{(studentLists[editingTask.gradeLevel || 'Quinto'] || []).map(name => <option key={name.split(' - ')[1]} value={name.split(' - ')[1]}>{name.split(' - ')[0]}</option>)}</select>
                      </div>
                    )}

                    <select value={editingTask.area} onChange={e=>setEditingTask({...editingTask, area:e.target.value})} className="w-full p-3 text-xs font-black">{areasList.map(a => <option key={a} value={a}>{a}</option>)}</select>
                    <input type="date" value={editingTask.date} onChange={e=>setEditingTask({...editingTask, date:e.target.value})} className="w-full p-3 text-xs font-black"/>
                    <input type="text" value={editingTask.title} onChange={e=>setEditingTask({...editingTask, title:e.target.value})} className="w-full p-3 text-xs font-black" placeholder="Título"/>
                    
                    <div className="flex gap-2 mb-2">
                        <input type="text" placeholder="URL de Imagen o subir 👉" value={editingTask.imageUrl || ''} onChange={e=>setEditingTask({...editingTask,imageUrl:e.target.value})} className="w-full p-3 text-[10px] font-black bg-stone-50 flex-1"/>
                        <label className="bg-stone-200 px-3 py-3 rounded-xl border border-stone-300 text-[10px] font-black cursor-pointer shadow-sm active:scale-95 shrink-0 flex items-center justify-center">📷<input type="file" accept="image/*" onChange={(e) => handleTaskImageUpload(e, true)} className="hidden"/></label>
                    </div>

                    <input type="url" placeholder="URL de YouTube o TikTok" value={editingTask.videoLink || ''} onChange={e=>setEditingTask({...editingTask, videoLink:e.target.value})} className="w-full p-3 text-[10px] font-black bg-stone-50"/>
                    <input type="url" placeholder="URL de Documento (Drive o PDF externo)" value={editingTask.pdfLink || ''} onChange={e=>setEditingTask({...editingTask, pdfLink:e.target.value})} className="w-full p-3 text-[10px] font-black bg-stone-50"/>
                    <textarea value={editingTask.description} onChange={e=>setEditingTask({...editingTask, description:e.target.value})} className="w-full p-3 text-xs font-bold h-32 resize-none" placeholder="Descripción"></textarea>
                    
                    <div className="bg-red-50 p-3 rounded-xl border border-red-200">
                        <label className="block text-[9px] font-black text-red-600 uppercase mb-2 flex items-center gap-1"><EyeOffIcon size={12}/> Ocultar a (Excluir estudiantes):</label>
                        <select onChange={e => { if(!e.target.value) return; const cur = editingTask.excludedStudents || []; if(!cur.includes(e.target.value)) { setEditingTask({...editingTask, excludedStudents: [...cur, e.target.value]}); } }} className="w-full p-2 text-[10px] font-black bg-white rounded-lg border border-red-200">
                            <option value="">Seleccionar para ocultar...</option>
                            {(studentLists[editingTask.gradeLevel || 'Quinto'] || []).map(name => <option key={name.split(' - ')[1]} value={name.split(' - ')[1]}>{name.split(' - ')[0]}</option>)}
                        </select>
                        <div className="flex flex-wrap gap-1 mt-2">
                            {(editingTask.excludedStudents || []).map(doc => {
                                const stuName = (studentLists[editingTask.gradeLevel || 'Quinto'] || []).find(s => s.includes(doc))?.split(' - ')[0] || doc;
                                return <span key={doc} onClick={() => setEditingTask({...editingTask, excludedStudents: editingTask.excludedStudents.filter(d => d !== doc)})} className="px-2 py-1 bg-red-600 text-white text-[8px] font-black rounded-lg cursor-pointer shadow-sm active:scale-90">✕ {stuName}</span>;
                            })}
                        </div>
                    </div>

                    <div className="bg-stone-50 p-3 rounded-xl border border-stone-200">
                      <label className="block text-[9px] font-black text-stone-500 uppercase mb-2">Programar Publicación (Opcional)</label>
                      <input type="datetime-local" value={editingTask.publishAt || ''} onChange={e=>setEditingTask({...editingTask, publishAt:e.target.value})} className="w-full p-3 text-[10px] font-black bg-white rounded-lg border border-stone-300"/>
                    </div>

                </div>
                <div className="flex gap-2 mt-6">
                    <button onClick={() => handlePreviewAgenda(editingTask)} disabled={isSaving} className="flex-[1] py-4 bg-sky-100 text-sky-700 border border-sky-200 font-black rounded-2xl text-[10px] uppercase shadow-sm">👁️ Previa</button>
                    <button onClick={()=>setEditingTask(null)} className="flex-[1] py-4 bg-stone-200 rounded-2xl font-black uppercase text-xs">Cancelar</button>
                    <button onClick={handleSaveEditTask} className="flex-[1.5] py-4 bg-emerald-900 text-[#facc15] rounded-2xl font-black uppercase text-xs shadow-lg">Guardar</button>
                </div>
              </div>
            </div>
          )}

          {editingGradeEntry && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-stone-900/70" onClick={()=>setEditingGradeEntry(null)} />
              <div className="relative bg-white w-full max-w-md rounded-[40px] p-6 border-t-[10px] border-[#facc15]">
                <h3 className="font-black mb-4 uppercase">{editingGradeEntry.nombreEstudiante}</h3>
                
                {editingGradeEntry.isNew && (
                    <div className="flex items-center gap-3 mb-4 bg-stone-100 p-3 rounded-xl border border-stone-200">
                        <input type="checkbox" id="chkSingleXp" checked={editingGradeEntry.giveXp !== false} onChange={e => setEditingGradeEntry({...editingGradeEntry, giveXp: e.target.checked})} className="w-6 h-6 accent-[#064e3b] cursor-pointer" />
                        <label htmlFor="chkSingleXp" className="text-[10px] font-black text-stone-600 uppercase cursor-pointer leading-tight">Otorgar XP y Medallas<br/><span className="text-[8px] text-stone-400">Desmarca si la nota viene de la App del Estudiante</span></label>
                    </div>
                )}

                <input type="text" value={editingGradeEntry.actividad} onChange={e=>setEditingGradeEntry({...editingGradeEntry, actividad: e.target.value})} className="w-full p-3 mb-3 border-b-2 border-stone-200 font-bold text-center outline-none" placeholder="Nombre de la Actividad"/>
                <input type="text" value={editingGradeEntry.score} onChange={e=>setEditingGradeEntry({...editingGradeEntry, score: e.target.value.replace(/,/g, '.')})} className="w-full p-5 text-3xl text-center font-black border-2 border-[#064e3b] rounded-2xl mb-4" placeholder="0.0"/>
                <textarea value={editingGradeEntry.observacion || ''} onChange={e=>setEditingGradeEntry({...editingGradeEntry, observacion: e.target.value})} className="w-full p-3 border-2 border-stone-200 rounded-2xl mb-4 h-24 resize-none" placeholder="Editar observación..."></textarea>
                
                <button onClick={async ()=>{ 
                    if(isSaving) return;
                    let actualArea = editingGradeEntry.area;
                    if (!actualArea || actualArea === "SIN_AREA") { const sibling = studentsData.find(r => r.actividad === editingGradeEntry.actividad && r.area && r.area !== "SIN_AREA"); actualArea = sibling ? sibling.area : ""; }
                    if (!actualArea) return Swal.fire('Error', 'Falta seleccionar el Área.', 'warning');
                    if (!editingGradeEntry.actividad) return Swal.fire('Error', 'Actividad obligatoria', 'warning');
                    setIsSaving(true);
                    try {
                        const newNota = parseFloat(editingGradeEntry.score.replace(',','.'));
                        const isJustRecovered = editingGradeEntry.originalNota < 3 && newNota >= 3;
                        const isRecovery = isJustRecovered || (editingGradeEntry.recuperada || false);
                        
                        let xpToAward = 0; let medalMod = 0; 
                        
                        if (editingGradeEntry.isNew && editingGradeEntry.giveXp !== false) {
                            if (newNota === 5.0) { xpToAward = 100; medalMod = 1; }
                            else if (newNota >= 4.6) xpToAward = 80;
                            else if (newNota >= 4.0) xpToAward = 50;
                            else if (newNota >= 3.0) xpToAward = 25;
                        } else if (!editingGradeEntry.isNew) {
                            if (editingGradeEntry.originalNota === 5.0 && newNota < 5.0) medalMod = -1;
                        }

                        const updateData = { actividad: editingGradeEntry.actividad, score: editingGradeEntry.score, nota: newNota, observacion: editingGradeEntry.observacion || '', recuperada: isRecovery, periodo: periodoActual, gradeLevel: editingGradeEntry.gradeLevel, area: actualArea, nombreEstudiante: editingGradeEntry.nombreEstudiante, documentoEstudiante: editingGradeEntry.documentoEstudiante, lastUpdate: Date.now(), xpProcessed: true };
                        if(isJustRecovered) updateData.notaAnterior = editingGradeEntry.originalNota;
                        
                        const batch = db.batch();
                        if (editingGradeEntry.isNew) { batch.set(db.collection("notasAcademicas").doc(editingGradeEntry.id), updateData); } 
                        else { batch.set(db.collection("notasAcademicas").doc(editingGradeEntry.id), updateData, { merge: true }); }

                        if (xpToAward > 0 || medalMod !== 0) {
                            const logData = {};
                            if (xpToAward > 0) { logData.xp = firebase.firestore.FieldValue.increment(xpToAward); logData.documentoEstudiante = editingGradeEntry.documentoEstudiante; logData.nombreEstudiante = editingGradeEntry.nombreEstudiante; }
                            if (medalMod !== 0 && actualArea) { logData.medallas = { [actualArea]: firebase.firestore.FieldValue.increment(medalMod) }; }
                            batch.set(db.collection("logrosEstudiantes").doc(editingGradeEntry.documentoEstudiante), logData, {merge: true});
                        }

                        if (xpToAward > 0) { batch.set(db.collection("historialXP").doc(), { documentoEstudiante: editingGradeEntry.documentoEstudiante, motivo: `Calificación en clase: ${editingGradeEntry.actividad}`, cantidad: xpToAward, timestamp: Date.now() }); }

                        if (newNota < 3.0) {
                            const alertExpDate = new Date(); alertExpDate.setHours(alertExpDate.getHours() + 24);
                            batch.set(db.collection("tableroAvisos").doc(), { mensaje: `⚠️ ALERTA ACADÉMICA\nEl estudiante presenta desempeño bajo.\n\n📚 ÁREA: ${actualArea}\n📝 ACTIVIDAD: ${editingGradeEntry.actividad}\n📉 NOTA: ${newNota}\n\nRevisar Alertas en Pizarra Escolar.`, color: 'red', imageUrl: URL_IMAGEN_ALERTA, videoUrl: "", docUrl: "", scope: 'Individual', targetGrades: [], targetStudentDoc: editingGradeEntry.documentoEstudiante, fecha: new Date().toLocaleDateString('es-CO', { weekday: 'long', day: 'numeric', month: 'short' }), timestamp: new Date().toISOString(), archived: false, likes: [], isSystemNotice: false, isXpNotice: false, publishAt: new Date().toISOString(), expiresAt: alertExpDate.toISOString() });
                        }
                        
                        await batch.commit(); setEditingGradeEntry(null); 
                        if(editingGradeEntry.isNew) { Swal.fire({ icon: 'success', title: 'Registro guardado', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false }); } 
                        else { Swal.fire({ icon: 'success', title: 'Registro actualizado', toast: true, position: 'top-end', timer: 2500, showConfirmButton: false }); }
                    } catch(e) { Swal.fire('Error', 'No se pudo actualizar el registro', 'error'); } finally { setIsSaving(false); }
                }} disabled={isSaving} className="w-full py-4 bg-[#064e3b] text-[#facc15] rounded-2xl font-black uppercase">Guardar Registro</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
